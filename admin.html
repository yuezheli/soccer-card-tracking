<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardTrack Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f7f4ef;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: #f7f4ef;
      padding: 1.5rem 2rem;
    }

    header .logo { font-size: 1.4rem; font-weight: bold; color: #c9a84c; }
    header .subtitle { font-size: 0.8rem; color: #999; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.2rem; }

    /* Password gate */
    .gate {
      max-width: 380px;
      margin: 6rem auto;
      background: #fff;
      padding: 2.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      text-align: center;
    }

    .gate h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .gate p { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: none;
    }

    .section {
      background: #fff;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .section h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #eee;
    }

    .form-group { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1px solid #ddd;
      background: #fafafa;
      font-family: inherit;
      font-size: 1rem;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    textarea:focus {
      border-color: #c9a84c;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; }

    .btn {
      background: #1a1a1a;
      color: #f7f4ef;
      border: none;
      padding: 0.9rem 2rem;
      font-family: inherit;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    .btn:hover { background: #c9a84c; color: #1a1a1a; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .message {
      padding: 0.8rem 1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    .message.success { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
    .message.error { background: #fdecea; color: #c62828; border-left: 3px solid #c62828; }

    /* QR result */
    .qr-result {
      display: none;
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: #fffdf5;
      border: 1px solid #e8d9a0;
      text-align: center;
    }

    .qr-result h3 { font-size: 1rem; margin-bottom: 1rem; color: #1a1a1a; }

    #qr-canvas { margin: 0 auto 1rem; display: block; }

    .card-url {
      font-size: 0.8rem;
      color: #888;
      word-break: break-all;
      margin-bottom: 1rem;
      font-family: monospace;
      background: #f0f0f0;
      padding: 0.5rem;
    }

    .btn-outline {
      background: transparent;
      color: #1a1a1a;
      border: 1px solid #1a1a1a;
      padding: 0.6rem 1.5rem;
      font-family: inherit;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s;
      width: auto;
      display: inline-block;
    }

    .btn-outline:hover { background: #1a1a1a; color: #f7f4ef; }

    /* Cards list */
    .cards-list { display: flex; flex-direction: column; gap: 0.8rem; }

    .card-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1rem;
      border: 1px solid #eee;
      background: #fafafa;
    }

    .card-item .card-name { font-weight: bold; font-size: 0.95rem; }
    .card-item .card-desc { font-size: 0.8rem; color: #888; margin-top: 0.2rem; font-style: italic; }

    .btn-small {
      background: #1a1a1a;
      color: #f7f4ef;
      border: none;
      padding: 0.4rem 0.9rem;
      font-family: inherit;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-small:hover { background: #c9a84c; color: #1a1a1a; }

    .empty { color: #bbb; font-style: italic; font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">CardTrack</div>
  <div class="subtitle">Admin Panel</div>
</header>

<!-- Password gate -->
<div class="gate" id="gate">
  <h2>Admin Access</h2>
  <p>Enter the admin password to manage cards.</p>
  <div class="form-group">
    <input type="password" id="password-input" placeholder="Password" onkeydown="if(event.key==='Enter') checkPassword()" />
  </div>
  <button class="btn" onclick="checkPassword()">Enter</button>
  <div class="message" id="gate-message"></div>
</div>

<!-- Admin panel -->
<div class="container" id="admin-panel">

  <!-- Create new card -->
  <div class="section">
    <h2>Add a New Card</h2>

    <div class="form-group">
      <label for="card-name">Card Name *</label>
      <input type="text" id="card-name" placeholder="e.g. 1986 Fleer Michael Jordan Rookie" />
    </div>

    <div class="form-group">
      <label for="card-desc">Description (optional)</label>
      <textarea id="card-desc" placeholder="e.g. PSA 8, excellent condition, purchased at regional show"></textarea>
    </div>

    <button class="btn" id="create-btn" onclick="createCard()">Create Card &amp; Generate QR Code</button>
    <div class="message" id="create-message"></div>

    <!-- QR Result -->
    <div class="qr-result" id="qr-result">
      <h3 id="qr-card-name"></h3>
      <div id="qr-canvas"></div>
      <div class="card-url" id="card-url-display"></div>
      <button class="btn-outline" onclick="downloadQR()">Download QR Code</button>
    </div>
  </div>

  <!-- Existing cards -->
  <div class="section">
    <h2>Your Cards</h2>
    <div class="cards-list" id="cards-list">
      <p class="empty">Loading...</p>
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://xtwcqxnrpfxgxrogidqo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_-G0J-7yyw-rA0w3pJCch1w_0Ynioete';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ---- IMPORTANT: Change this password to something only your husband knows ----
  const ADMIN_PASSWORD = 'soco-card-track-2026';
  // ----------------------------------------------------------------------------

  // The base URL of your GitHub Pages site — update this after deploying
  const SITE_BASE_URL = 'https://yuezheli.github.io/soccer-card-tracking';

  function checkPassword() {
    const val = document.getElementById('password-input').value;
    if (val === ADMIN_PASSWORD) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadCards();
    } else {
      const msg = document.getElementById('gate-message');
      msg.textContent = 'Incorrect password.';
      msg.className = 'message error';
      msg.style.display = 'block';
    }
  }

  async function createCard() {
    const name = document.getElementById('card-name').value.trim();
    const desc = document.getElementById('card-desc').value.trim();
    const btn = document.getElementById('create-btn');
    const msgEl = document.getElementById('create-message');

    msgEl.style.display = 'none';
    document.getElementById('qr-result').style.display = 'none';

    if (!name) {
      showMsg(msgEl, 'Card name is required.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating...';

    const { data, error } = await client.from('cards').insert({
      name,
      description: desc || null,
    }).select().single();

    btn.disabled = false;
    btn.textContent = 'Create Card & Generate QR Code';

    if (error) {
      showMsg(msgEl, 'Error: ' + error.message, 'error');
      return;
    }

    showMsg(msgEl, 'Card created successfully!', 'success');
    showQR(data);
    loadCards();

    document.getElementById('card-name').value = '';
    document.getElementById('card-desc').value = '';
  }

  function showQR(card) {
    const cardUrl = `${SITE_BASE_URL}/card.html?id=${card.id}`;
    document.getElementById('qr-card-name').textContent = card.name;
    document.getElementById('card-url-display').textContent = cardUrl;

    const canvas = document.getElementById('qr-canvas');
    canvas.innerHTML = '';
    new QRCode(canvas, {
      text: cardUrl,
      width: 200,
      height: 200,
      colorDark: '#1a1a1a',
      colorLight: '#ffffff',
    });

    document.getElementById('qr-result').style.display = 'block';
  }

  function downloadQR() {
    const canvas = document.getElementById('qr-canvas');
    const link = document.createElement('a');
    link.download = 'card-qr.png';
    link.href = canvas.toDataURL();
    link.click();
  }

  async function loadCards() {
    const { data, error } = await client.from('cards').select('*').order('created_at', { ascending: false });
    const el = document.getElementById('cards-list');

    if (error || !data || data.length === 0) {
      el.innerHTML = '<p class="empty">No cards yet. Add your first card above.</p>';
      return;
    }

    el.innerHTML = data.map(card => `
      <div class="card-item">
        <div>
          <div class="card-name">${card.name}</div>
          ${card.description ? `<div class="card-desc">${card.description}</div>` : ''}
        </div>
        <button class="btn-small" onclick="regenerateQR('${card.id}', '${card.name.replace(/'/g, "\\'")}')">
          Get QR
        </button>
      </div>
    `).join('');
  }

  function regenerateQR(id, name) {
    showQR({ id, name });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = 'message ' + type;
    el.style.display = 'block';
  }
</script>
</body>
</html>
